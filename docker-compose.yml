services:
  postgres:
    image: postgres:16-alpine
    container_name: lumiere-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumiere
      POSTGRES_PASSWORD: lumiere
      POSTGRES_DB: lumiere_salon
    ports:
      - "5432:5432"
    volumes:
      - lumiere_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumiere -d lumiere_salon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lumiere_pgdata:
